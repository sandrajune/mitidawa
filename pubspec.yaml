name: mitidawa
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'  # Updated to support your Flutter 3.14.4 and newer packages

dependencies:
  flutter:
    sdk: flutter

  # Core Firebase
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3

  # Camera / Gallery
  image_picker: ^1.0.8
  camera: ^0.10.6
  camera_android: ^0.10.0+4
  camera_platform_interface: ^2.10.0



  # TFLite for model inference
  tflite_flutter: ^0.11.0

  # Helpers
  image: ^4.2.0
  path_provider: ^2.0.11
  permission_handler: ^11.3.1

  # iOS-style icons (optional, but included by default)
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/plant_identifier_final.tflite
    - assets/labels.txt
